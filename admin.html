<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel - GetInBudget</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--orange:#FF6B00;--dark:#0A0A0A;--card:#111;--border:#222;--text:#EEE;--muted:#888;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--dark);color:var(--text);font-family:'Poppins',sans-serif;min-height:100vh;}

/* LOGIN */
#loginScreen{position:fixed;inset:0;background:var(--dark);display:flex;align-items:center;justify-content:center;z-index:999;padding:20px;}
#loginScreen.hidden{display:none;}
.login-box{background:#111;border:1px solid var(--orange);border-radius:16px;padding:32px 24px;width:100%;max-width:340px;text-align:center;}
.login-logo{font-family:'Bebas Neue',sans-serif;font-size:32px;background:linear-gradient(90deg,#FF6B00,#FF2200);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:2px;margin-bottom:6px;}
.login-sub{color:var(--muted);font-size:12px;margin-bottom:24px;}
.login-input{width:100%;background:#1a1a1a;border:1px solid var(--border);color:var(--text);padding:12px 16px;border-radius:8px;font-family:'Poppins',sans-serif;font-size:14px;outline:none;margin-bottom:14px;text-align:center;letter-spacing:3px;}
.login-input:focus{border-color:var(--orange);}
.login-btn{width:100%;background:var(--orange);color:#000;border:none;padding:14px;border-radius:8px;font-family:'Poppins',sans-serif;font-weight:700;font-size:14px;cursor:pointer;letter-spacing:1px;}
.login-err{color:#ff4444;font-size:12px;margin-top:10px;display:none;}

/* ADMIN */
#adminScreen{display:none;padding:20px;max-width:600px;margin:0 auto;}
#adminScreen.show{display:block;}
.admin-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;padding-top:10px;}
.admin-title{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--orange);letter-spacing:2px;}
.logout-btn{background:transparent;border:1px solid var(--border);color:var(--muted);padding:8px 16px;border-radius:6px;font-family:'Poppins',sans-serif;font-size:11px;cursor:pointer;}
.view-site{background:var(--orange);color:#000;padding:8px 16px;border-radius:6px;font-size:11px;font-weight:700;text-decoration:none;letter-spacing:1px;}

/* FORM */
.form-card{background:#111;border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:20px;}
.form-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;margin-bottom:16px;color:var(--orange);}
.form-group{margin-bottom:12px;}
.form-group label{display:block;font-size:10px;font-weight:700;letter-spacing:1px;color:var(--muted);margin-bottom:5px;text-transform:uppercase;}
.form-group input,.form-group select{width:100%;background:#1a1a1a;border:1px solid var(--border);color:var(--text);padding:10px 14px;border-radius:8px;font-family:'Poppins',sans-serif;font-size:13px;outline:none;}
.form-group input:focus,.form-group select:focus{border-color:var(--orange);}
.form-group select option{background:#1a1a1a;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.img-preview{width:100%;height:100px;background:#1a1a1a;border:1px dashed var(--border);border-radius:8px;display:flex;align-items:center;justify-content:center;overflow:hidden;margin-top:6px;}
.img-preview img{width:100%;height:100%;object-fit:cover;}
.img-preview span{color:var(--muted);font-size:11px;text-align:center;padding:10px;}
.add-btn{width:100%;background:var(--orange);color:#000;border:none;padding:13px;border-radius:8px;font-family:'Poppins',sans-serif;font-weight:700;font-size:14px;cursor:pointer;letter-spacing:1px;margin-top:4px;}
.add-btn:active{transform:scale(0.98);}

/* PRODUCTS LIST */
.products-card{background:#111;border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:20px;}
.prod-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);}
.prod-item:last-child{border-bottom:none;}
.prod-thumb{width:48px;height:48px;border-radius:8px;object-fit:cover;background:#1a1a1a;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;overflow:hidden;}
.prod-thumb img{width:100%;height:100%;object-fit:cover;}
.prod-info{flex:1;min-width:0;}
.prod-name{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.prod-meta{font-size:10px;color:var(--muted);margin-top:2px;}
.prod-price{font-size:13px;font-weight:700;color:var(--orange);flex-shrink:0;}
.del-btn{background:rgba(255,0,0,0.15);border:1px solid rgba(255,0,0,0.3);color:#ff4444;width:32px;height:32px;border-radius:6px;cursor:pointer;font-size:14px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.empty-list{color:var(--muted);font-size:12px;text-align:center;padding:20px;}
.cat-tabs{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.cat-tab{padding:6px 14px;border-radius:6px;border:1px solid var(--border);color:var(--muted);font-size:11px;font-weight:600;cursor:pointer;background:transparent;}
.cat-tab.active{background:var(--orange);color:#000;border-color:var(--orange);}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1a1a;border:1px solid var(--orange);color:var(--text);padding:12px 24px;border-radius:8px;font-size:13px;font-weight:600;z-index:300;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px;}
.stat-box{background:#111;border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center;}
.stat-num{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--orange);}
.stat-label{font-size:10px;color:var(--muted);letter-spacing:1px;}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">GetInBudget</div>
    <div class="login-sub">🔒 Admin Panel — Sirf Owner Access</div>
    <input type="password" class="login-input" id="passInput" placeholder="••••••••" onkeypress="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">🔓 LOGIN</button>
    <div class="login-err" id="loginErr">❌ Galat Password!</div>
  </div>
</div>

<!-- ADMIN -->
<div id="adminScreen">
  <div class="admin-header">
    <div class="admin-title">⚙️ ADMIN PANEL</div>
    <div style="display:flex;gap:8px;">
      <a href="index.html" class="view-site">🌐 SITE</a>
      <button class="logout-btn" onclick="logout()">LOGOUT</button>
    </div>
  </div>

  <!-- STATS -->
  <div class="stats">
    <div class="stat-box"><div class="stat-num" id="totalCount">0</div><div class="stat-label">PRODUCTS</div></div>
    <div class="stat-box"><div class="stat-num" id="bikeCount">0</div><div class="stat-label">BIKE MODS</div></div>
    <div class="stat-box"><div class="stat-num" id="fashionCount">0</div><div class="stat-label">FASHION</div></div>
  </div>

  <!-- ADD FORM -->
  <div class="form-card">
    <div class="form-title">➕ NAYA PRODUCT ADD KARO</div>

    <div class="form-group">
      <label>Product Name *</label>
      <input type="text" id="pName" placeholder="jaise: LED Indicator Lights">
    </div>
    <div class="form-group">
      <label>Affiliate Link *</label>
      <input type="url" id="pLink" placeholder="https://amzn.to/...">
    </div>
    <div class="form-group">
      <label>Product Image URL</label>
      <input type="url" id="pImg" placeholder="Amazon product image URL" oninput="previewImg()">
      <div class="img-preview" id="imgPreview"><span>Image URL daalne par preview dikhega 👆</span></div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Price *</label>
        <input type="text" id="pPrice" placeholder="₹299">
      </div>
      <div class="form-group">
        <label>Original Price</label>
        <input type="text" id="pOrig" placeholder="₹599">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Category *</label>
        <select id="pCat">
          <option value="bike">🏍️ Bike Mods</option>
          <option value="fashion">👕 Fashion</option>
          <option value="gadget">🎧 Gadgets</option>
        </select>
      </div>
      <div class="form-group">
        <label>Platform</label>
        <select id="pPlatform">
          <option>AMAZON</option>
          <option>FLIPKART</option>
          <option>MEESHO</option>
          <option>MYNTRA</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>Badge</label>
      <select id="pBadge">
        <option value="">Koi nahi</option>
        <option value="HOT">🔥 HOT</option>
        <option value="NEW">✨ NEW</option>
        <option value="VIRAL">⚡ VIRAL</option>
        <option value="BEST">⭐ BEST</option>
        <option value="SALE">💰 SALE</option>
      </select>
    </div>
    <button class="add-btn" onclick="addProduct()">➕ ADD PRODUCT</button>
  </div>

  <!-- PRODUCTS LIST -->
  <div class="products-card">
    <div class="form-title">📦 TUMHARE PRODUCTS</div>
    <div class="cat-tabs">
      <div class="cat-tab active" onclick="filterCat('all',this)">All</div>
      <div class="cat-tab" onclick="filterCat('bike',this)">🏍️ Bike</div>
      <div class="cat-tab" onclick="filterCat('fashion',this)">👕 Fashion</div>
      <div class="cat-tab" onclick="filterCat('gadget',this)">🎧 Gadgets</div>
    </div>
    <div id="productsList"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const PASS = 'getinbudget@777';
let currentFilter = 'all';

// LOGIN
function doLogin(){
  const p = document.getElementById('passInput').value;
  if(p === PASS){
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('adminScreen').classList.add('show');
    renderProducts();
    updateStats();
  } else {
    document.getElementById('loginErr').style.display='block';
    document.getElementById('passInput').value='';
    setTimeout(()=>document.getElementById('loginErr').style.display='none',2000);
  }
}

function logout(){
  document.getElementById('loginScreen').classList.remove('hidden');
  document.getElementById('adminScreen').classList.remove('show');
  document.getElementById('passInput').value='';
}

// DATA
function getP(){ return JSON.parse(localStorage.getItem('gib_v2')||'[]'); }
function saveP(p){ localStorage.setItem('gib_v2', JSON.stringify(p)); }

// ADD
function addProduct(){
  const name=document.getElementById('pName').value.trim();
  const link=document.getElementById('pLink').value.trim();
  const price=document.getElementById('pPrice').value.trim();
  if(!name||!link||!price){ showToast('❌ Name, Link aur Price zaroori hai!'); return; }
  const p={
    id: Date.now().toString(),
    name, link, price,
    img: document.getElementById('pImg').value.trim(),
    orig: document.getElementById('pOrig').value.trim(),
    cat: document.getElementById('pCat').value,
    platform: document.getElementById('pPlatform').value,
    badge: document.getElementById('pBadge').value
  };
  const arr=getP(); arr.push(p); saveP(arr);
  clearForm(); renderProducts(); updateStats();
  showToast('✅ Product add ho gaya!');
}

// DELETE
function delProduct(id){
  if(!confirm('Delete karna chahte ho?')) return;
  saveP(getP().filter(p=>p.id!==id));
  renderProducts(); updateStats();
  showToast('🗑️ Deleted!');
}

// RENDER
function renderProducts(){
  const arr = currentFilter==='all' ? getP() : getP().filter(p=>p.cat===currentFilter);
  const el = document.getElementById('productsList');
  if(!arr.length){ el.innerHTML='<div class="empty-list">Koi product nahi — upar se add karo! 👆</div>'; return; }
  el.innerHTML = arr.map(p=>`
    <div class="prod-item">
      <div class="prod-thumb">
        ${p.img?`<img src="${p.img}" onerror="this.style.display='none'">`:'🛍️'}
      </div>
      <div class="prod-info">
        <div class="prod-name">${p.name}</div>
        <div class="prod-meta">${p.cat.toUpperCase()} • ${p.platform} ${p.badge?'• '+p.badge:''}</div>
      </div>
      <div class="prod-price">${p.price}</div>
      <button class="del-btn" onclick="delProduct('${p.id}')">✕</button>
    </div>`).join('');
}

function filterCat(cat, el){
  currentFilter=cat;
  document.querySelectorAll('.cat-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  renderProducts();
}

function updateStats(){
  const arr=getP();
  document.getElementById('totalCount').textContent=arr.length;
  document.getElementById('bikeCount').textContent=arr.filter(p=>p.cat==='bike').length;
  document.getElementById('fashionCount').textContent=arr.filter(p=>p.cat==='fashion').length;
}

// IMAGE PREVIEW
function previewImg(){
  const url=document.getElementById('pImg').value;
  const el=document.getElementById('imgPreview');
  el.innerHTML=url?`<img src="${url}" onerror="this.parentElement.innerHTML='<span>Image load nahi hui</span>'">`:'<span>Image URL daalne par preview dikhega 👆</span>';
}

// CLEAR FORM
function clearForm(){
  ['pName','pLink','pImg','pPrice','pOrig'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('pBadge').value='';
  document.getElementById('imgPreview').innerHTML='<span>Image URL daalne par preview dikhega 👆</span>';
}

// TOAST
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}
</script>
</body>
</html>
